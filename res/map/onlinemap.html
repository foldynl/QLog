<!DOCTYPE html>
<html>

<head>
  <title>Online Map</title>
  <meta charset="utf8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A==" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
  <script src="https://foldynl.github.io/QLog/js/L.MaidenheadConfWorked.js"></script>
  <script src="https://foldynl.github.io/QLog/js/L.Terminator.js"></script>
  <script src="https://foldynl.github.io/QLog/js/heatmap.js"></script>
  <script src="https://foldynl.github.io/QLog/js/leaflet-heatmap.js"></script>
  <script src="https://unpkg.com/leaflet.geodesic@2.6.1/dist/leaflet.geodesic.umd.min.js"></script>
  <style>
    body {
      padding: 0;
      margin: 0;
      background: #f3f4f6;
    }
    html, body, #map {
      height: 100%;
    }
    body.qlog-map-dark {
      background: #454d55;
    }
    body.qlog-map-dark .leaflet-control-layers,
    body.qlog-map-dark .leaflet-bar a,
    body.qlog-map-dark .leaflet-control-attribution {
      background: rgba(70, 78, 87, 0.92);
      color: #f3f5f7;
      border-color: rgba(148, 156, 166, 0.58);
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.18);
    }
    body.qlog-map-dark .leaflet-bar a {
      border-bottom-color: rgba(148, 156, 166, 0.58);
    }
    body.qlog-map-dark .leaflet-bar a:hover,
    body.qlog-map-dark .leaflet-control-layers-expanded {
      background: rgba(82, 91, 101, 0.96);
    }
    body.qlog-map-dark .leaflet-control-attribution a {
      color: #d6dbe0;
    }
    body.qlog-map-dark .leaflet-popup-content-wrapper,
    body.qlog-map-dark .leaflet-popup-tip {
      background: #4c5560;
      color: #eceff2;
    }
    .leaflet-tooltip {
        border: 0px;
        color: #232D45;
        box-shadow: none;
        margin: 0px !important;
        line-height: 10px;
        font-weight: 900;
      }
    .leaflet-tooltip-top:before,
    .leaflet-tooltip-bottom:before,
    .leaflet-tooltip-left:before,
    .leaflet-tooltip-right:before {
        border: none !important;
    }
    .leaflet-tooltip.muf-tooltip {
        border-radius: 20px;
        background-color: transparent;
        padding: 5px;
        font-weight: bold;
    }
    .leaflet-tooltip.chat-tooltip {
        border-radius: 20px;
        background-color: transparent;
        padding: 5px;
        font-weight: bold;
    }
    .leaflet-tooltip.wsjtx-tooltip {
        border-radius: 20px;
        background-color: transparent;
        padding: 5px;
        font-weight: bold;
    }
    .leaflet-tooltip.wsjtx-tooltip.fade-out75 {
        opacity: 0.75 !important; /* !important zajistí, že tato hodnota má přednost */
    }

    .leaflet-tooltip.wsjtx-tooltip.fade-out50 {
        opacity: 0.5 !important; /* !important zajistí, že tato hodnota má přednost */
    }

    .busy{
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }
    .busy.hidden{ display:none; }
    body.qlog-map-dark .busy {
      background: rgba(62, 70, 79, 0.46);
    }

    .spinner{
      width: 42px;
      height: 42px;
      border: 4px solid rgba(0,0,0,0.15);
      border-top-color: rgba(0,0,0,0.6);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    body.qlog-map-dark .spinner {
      border-color: rgba(255,255,255,0.18);
      border-top-color: rgba(255,255,255,0.72);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .label{ margin-top: 10px; font: 14px sans-serif; color:#333; }
    body.qlog-map-dark .label{ color:#d7dce2; }

  </style>
</head>

<body>

  <div id="map"></div>

  <div id="busyOverlay" class="busy hidden">
    <div class="spinner"></div>
    <div class="label">Rendering…</div>
  </div>

  <script>

    var grids_worked = [];    //field of Grids used for rendering Worked Grids
    var grids_confirmed = []; //field of Grids used for rendering Confirmed Grids
    var mylocations = [];     //field of My Locations
    var locations = [];
    var staticMapTime = null;

    var map = L.map('map', {center: [0,0], zoom: 2, minZoom: 1});
    var layerControl = null;
    var mapBridge = null;
    const qlogLayerStateKeys = new Map();
    let qlogLayerStateBridgeConnected = false;

    function mapLayerByKey(key) {
      return window[key] || null;
    }

    function sendToQt(method) {
      if (!window.mapBridge || typeof window.mapBridge[method] !== 'function')
        return;

      window.mapBridge[method].apply(window.mapBridge, Array.prototype.slice.call(arguments, 1));
    }

    function setQLogLayerVisibility(key, visible) {
      const layer = mapLayerByKey(key);
      if (!layer)
        return;

      if (visible)
        map.addLayer(layer);
      else
        map.removeLayer(layer);
    }

    function restoreQLogLayerStates(states) {
      states.forEach(function(state) {
        setQLogLayerVisibility(state.key, state.visible);
      });
    }

    function configureLayerControl(layers) {
      const overlays = {};
      qlogLayerStateKeys.clear();

      layers.forEach(function(layerSpec) {
        const layer = mapLayerByKey(layerSpec.key);
        if (!layer)
          return;

        overlays[layerSpec.label] = layer;
        qlogLayerStateKeys.set(layer, layerSpec.key);
      });

      if (layerControl)
        map.removeControl(layerControl);

      layerControl = new L.Control.Layers(null, overlays, {}).addTo(map);
    }

    function handleQLogLayerStateChanged(layer, state) {
      const key = qlogLayerStateKeys.get(layer);
      if (!key)
        return;

      sendToQt('handleLayerSelectionChanged', key, state);
    }

    function connectQtMapBridge(handler) {
      window.mapBridge = handler;

      if (qlogLayerStateBridgeConnected)
        return;

      map.on('overlayadd', function(e) {
        handleQLogLayerStateChanged(e.layer, 'on');
      });
      map.on('overlayremove', function(e) {
        handleQLogLayerStateChanged(e.layer, 'off');
      });
      qlogLayerStateBridgeConnected = true;
    }

    map.createPane('lowestPane');
    map.getPane('lowestPane').style.zIndex = 200;
    map.getPane('lowestPane').style.pointerEvents = 'none';


    // green Icon definition. It is usually used for confirmed QSOs
    const greenIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });
    const greenIconSmall = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
      iconSize: [14, 23],
      iconAnchor: [7, 23],
      popupAnchor: [1, -18],
      shadowSize: [23, 23]
    });

    // yellow Icon definition. It is usually used for generic QSOs or generic point
    const yellowIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const yellowIconSmall = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
      iconSize: [14, 23],
      iconAnchor: [7, 23],
      popupAnchor: [1, -18],
      shadowSize: [23, 23]
    });

    // home Icon definition. It is usually used for own location
    const homeIcon = new L.Icon({
      iconUrl: 'https://img.icons8.com/officel/30/000000/radio-tower.png',
      iconSize: [30, 30],
      iconAnchor: [15, 25],
      popupAnchor: [1, -14]
    });

    const mapIcons = {
      greenIcon: greenIcon,
      greenIconSmall: greenIconSmall,
      yellowIcon: yellowIcon,
      yellowIconSmall: yellowIconSmall,
      homeIcon: homeIcon
    };

    const fastMarkerThreshold = 2000;
    var fastMarkersLayer = null;
    const fastMarkerImages = {};

    function resolveIcon(icon) {
      return mapIcons[icon] || null;
    }

    function normalizePoint(point) {
      if (Array.isArray(point)) {
        return {
          label: point[0],
          lat: point[1],
          lng: point[2],
          icon: point[3]
        };
      }

      return point;
    }

    function markerOptions(point) {
      const icon = resolveIcon(point.icon);
      return icon ? {icon: icon} : {};
    }

    function fastMarkerImage(url, onLoad) {
      if (!url)
        return null;

      if (fastMarkerImages[url]) {
        if (onLoad && !fastMarkerImages[url].loaded)
          fastMarkerImages[url].callbacks.push(onLoad);
        return fastMarkerImages[url];
      }

      const image = new Image();
      fastMarkerImages[url] = { image: image, loaded: false, callbacks: onLoad ? [onLoad] : [] };
      image.onload = function() {
        const entry = fastMarkerImages[url];
        entry.loaded = true;
        const callbacks = entry.callbacks;
        entry.callbacks = [];
        callbacks.forEach(callback => callback());
      };
      image.src = url;

      return fastMarkerImages[url];
    }

    function fastMarkerPoint(point) {
      const mapPoint = normalizePoint(point);
      const icon = resolveIcon(mapPoint.icon);
      if (!icon)
        return mapPoint;

      const iconOptions = icon.options || {};
      const iconSize = iconOptions.iconSize || [25, 41];
      mapPoint.iconOptions = iconOptions;
      mapPoint.iconSize = iconSize;
      mapPoint.iconAnchor = iconOptions.iconAnchor || [Math.floor(iconSize[0] / 2), iconSize[1]];

      return mapPoint;
    }

    const FastMarkerLayer = L.Layer.extend({
      initialize: function(points) {
        this.points = points.map(fastMarkerPoint);
        this.pendingImageUrls = {};
      },

      onAdd: function(map) {
        this.map = map;
        this.shadowCanvas = L.DomUtil.create('canvas', 'qlog-fast-marker-shadows');
        this.iconCanvas = L.DomUtil.create('canvas', 'qlog-fast-markers');
        this.shadowCanvas.style.pointerEvents = 'none';
        this.iconCanvas.style.pointerEvents = 'none';
        map.getPane('shadowPane').appendChild(this.shadowCanvas);
        map.getPane('markerPane').appendChild(this.iconCanvas);
        map.on('moveend zoomend resize', this.reset, this);
        map.on('click', this.handleClick, this);
        this.reset();
      },

      onRemove: function(map) {
        map.off('moveend zoomend resize', this.reset, this);
        map.off('click', this.handleClick, this);
        L.DomUtil.remove(this.shadowCanvas);
        L.DomUtil.remove(this.iconCanvas);
        this.shadowCanvas = null;
        this.iconCanvas = null;
        this.map = null;
      },

      reset: function() {
        if (!this.map || !this.shadowCanvas || !this.iconCanvas)
          return;

        const size = this.map.getSize();
        const topLeft = this.map.containerPointToLayerPoint([0, 0]);
        [this.shadowCanvas, this.iconCanvas].forEach(canvas => {
          L.DomUtil.setPosition(canvas, topLeft);
          canvas.width = size.x;
          canvas.height = size.y;
        });
        this.draw();
      },

      drawMarkerImage: function(ctx, iconOptions, markerPoint, imageKey, sizeKey, anchorKey, drawnKeys) {
        const url = iconOptions[imageKey];
        const size = iconOptions[sizeKey];
        const anchor = iconOptions[anchorKey] || iconOptions.iconAnchor;
        if (!url || !size || !anchor)
          return;

        const imageEntry = fastMarkerImage(url, this.pendingImageUrls[url] ? null : () => {
          delete this.pendingImageUrls[url];
          this.draw();
        });
        if (!imageEntry || !imageEntry.loaded) {
          this.pendingImageUrls[url] = true;
          return;
        }

        const x = markerPoint.x - anchor[0];
        const y = markerPoint.y - anchor[1];

        if (drawnKeys) {
          const key = [url, size[0], size[1], Math.round(x), Math.round(y)].join('|');
          if (drawnKeys[key])
            return;
          drawnKeys[key] = true;
        }

        ctx.drawImage(imageEntry.image, x, y, size[0], size[1]);
      },

      visiblePoints: function() {
        const size = this.map.getSize();
        const visible = [];

        this.points.forEach(point => {
          if (!point.iconOptions)
            return;

          const markerPoint = this.map.latLngToContainerPoint([point.lat, point.lng]);
          if (markerPoint.x < -point.iconSize[0]
              || markerPoint.y < -point.iconSize[1]
              || markerPoint.x > size.x + point.iconSize[0]
              || markerPoint.y > size.y + point.iconSize[1])
            return;

          visible.push({
            point: point,
            markerPoint: markerPoint
          });
        });

        return visible;
      },

      draw: function() {
        if (!this.map || !this.shadowCanvas || !this.iconCanvas)
          return;

        const shadowCtx = this.shadowCanvas.getContext('2d');
        const iconCtx = this.iconCanvas.getContext('2d');
        const size = this.map.getSize();
        shadowCtx.clearRect(0, 0, size.x, size.y);
        iconCtx.clearRect(0, 0, size.x, size.y);
        const visible = this.visiblePoints();
        const drawnShadows = {};

        visible.forEach(item => {
          this.drawMarkerImage(shadowCtx, item.point.iconOptions, item.markerPoint,
                               'shadowUrl', 'shadowSize', 'shadowAnchor', drawnShadows);
        });

        visible.forEach(item => {
          this.drawMarkerImage(iconCtx, item.point.iconOptions, item.markerPoint,
                               'iconUrl', 'iconSize', 'iconAnchor');
        });
      },

      handleClick: function(event) {
        const clickPoint = this.map.latLngToContainerPoint(event.latlng);
        let bestPoint = null;
        let bestDistance = Number.MAX_VALUE;

        this.points.forEach(point => {
          if (!point.iconOptions)
            return;

          const markerPoint = this.map.latLngToContainerPoint([point.lat, point.lng]);
          const left = markerPoint.x - point.iconAnchor[0];
          const top = markerPoint.y - point.iconAnchor[1];
          const right = left + point.iconSize[0];
          const bottom = top + point.iconSize[1];

          if (clickPoint.x < left || clickPoint.x > right
              || clickPoint.y < top || clickPoint.y > bottom)
            return;

          const dx = markerPoint.x - clickPoint.x;
          const dy = markerPoint.y - clickPoint.y;
          const distance = dx * dx + dy * dy;
          if (distance < bestDistance) {
            bestDistance = distance;
            bestPoint = point;
          }
        });

        if (bestPoint) {
          L.popup()
            .setLatLng([bestPoint.lat, bestPoint.lng])
            .setContent(bestPoint.label)
            .openOn(this.map);
        }
      }
    });

    function clearFastMarkerLayer() {
      if (!fastMarkersLayer)
        return;

      map.removeLayer(fastMarkersLayer);
      fastMarkersLayer = null;
    }

    function normalizePath(path) {
      if (Array.isArray(path)) {
        return {
          from: {lat: path[0], lng: path[1]},
          to: {lat: path[2], lng: path[3]}
        };
      }

      return path;
    }


    var language = navigator.language || navigator.userLanguage;
    var mapUrl;

    // based on the language setting, qlog uses the map tile server
    if (language === 'de') {
      mapUrl = 'https://tile.openstreetmap.de/{z}/{x}/{y}.png';
    } else if (language === 'fr') {
      mapUrl = 'https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png';
    } else {
      mapUrl = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
    }

    L.tileLayer(mapUrl, {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var maidenheadConfWorked = L.maidenheadConfWorked({color : 'rgba(255, 0, 0, 0.5)'}).addTo(map);
    var grayline = L.terminator()

    function setTerminatorTheme(isDark) {
      const styles = isDark
        ? {
            civil: { fillColor: '#c8c8c8', fillOpacity: 0.13, stroke: true, color: '#d6d6d6', opacity: 0.26, weight: 1 },
            nautical: { fillColor: '#aeaeae', fillOpacity: 0.16, stroke: true, color: '#c2c2c2', opacity: 0.24, weight: 1 },
            astronomical: { fillColor: '#949494', fillOpacity: 0.19, stroke: true, color: '#adadad', opacity: 0.22, weight: 1 }
          }
        : {
            civil: { fillColor: '#767676', fillOpacity: 0.14, stroke: true, color: '#5f5f5f', opacity: 0.18, weight: 1 },
            nautical: { fillColor: '#626262', fillOpacity: 0.17, stroke: true, color: '#555', opacity: 0.16, weight: 1 },
            astronomical: { fillColor: '#4e4e4e', fillOpacity: 0.20, stroke: true, color: '#484848', opacity: 0.14, weight: 1 }
          };

      Object.keys(styles).forEach(function(name) {
        const terminator = grayline.getTerminator(name);
        if (terminator)
          terminator.setStyle(styles[name]);
      });
    }

    function setMapDarkMode(isDark) {
      document.body.classList.toggle('qlog-map-dark', isDark);

      const tileFilter = isDark
        ? 'invert(1) hue-rotate(180deg) brightness(1.42) contrast(0.70) saturate(0.62)'
        : '';
      map.getPanes().tilePane.style.filter = tileFilter;
      map.getPanes().tilePane.style.webkitFilter = tileFilter;

      setTerminatorTheme(isDark);
    }

    setMapDarkMode(false);

    setInterval(function(){updateTerminator(grayline)}, 60000);

    function updateTerminator(grayline)
    {
      if (!staticMapTime) {
        grayline.setTime();
        grayline.redraw();
      }
    }

    let busyToken = 0;

    function busyShow(msg) {
      const el = document.getElementById('busyOverlay');
      el.querySelector('.label').textContent = msg;
      el.classList.remove('hidden');
    }

    function busyHide() {
      document.getElementById('busyOverlay').classList.add('hidden');
    }

    async function runBusy(msg, fn) {
      if (!msg) {
        fn();
        return;
      }

      const token = ++busyToken;
      busyShow(msg);

      await new Promise(requestAnimationFrame);
      fn();

      setTimeout(function() {
        if (token === busyToken) busyHide();
      }, 0);
    }

    // Configuration for Aurora Heatmap
    const auroraCfg = {
      // radius should be small ONLY if scaleRadius is true (or small radius is intended)
      "radius": 2,
      "maxOpacity": .3,
      // scales the radius based on map zoom
      "scaleRadius": true,
      // if set to false the heatmap uses the global maximum for colorization
      // if activated: uses the data maximum within the current map boundaries
      //   (there will always be a red spot with useLocalExtremas true)
      "useLocalExtrema": false,
      // which field name in your data represents the latitude - default "lat"
      latField: 'lat',
      // which field name in your data represents the longitude - default "lng"
      lngField: 'lng',
      // which field name in your data represents the data value - default "value"
      valueField: 'count'
    };

    var auroraLayer = new HeatmapOverlay(auroraCfg);

    // Path 1 - usually used for rendering Path between my station and QSO station
    var pathLayer = L.layerGroup().addTo(map);
    const geodesic = new L.Geodesic([],{ wrap: false, color: "Fuchsia", steps: 5});
    const shortPathsGeodesic = new L.Geodesic([],{ wrap: false, color: "#cc2e41", steps: 5, opacity: 0.7, weight: 1});
    pathLayer.addLayer(geodesic);
    pathLayer.addLayer(shortPathsGeodesic);

    var antPathLayer = L.layerGroup().addTo(map);
    var antGeodesic1 = new L.Geodesic([],{ wrap: false, color: "orange", steps: 5,
                                           dashArray: '10,10', dashOffset: '10'});
    var antGeodesic2 = new L.Geodesic([],{ wrap: false, color: "orange", steps: 5,
                                           dashArray: '10,10', dashOffset: '10'});
    antPathLayer.addLayer(antGeodesic1);
    antPathLayer.addLayer(antGeodesic2);

    function drawPath(points) {
        geodesic.setLatLngs([]);
        shortPathsGeodesic.setLatLngs([]);

        if (points.length != 2)
            return;
        geodesic.setLatLngs([points[0], points[1]]);
        map.fitBounds(geodesic.getBounds(), {animate:false});
    }

    function drawShortPaths(coords) {
        const paths = [];
        geodesic.setLatLngs([]);
        coords.forEach(function(rawPath) {
            const path = normalizePath(rawPath);
            paths.push([path.from, path.to]);
        });
        shortPathsGeodesic.setLatLngs(paths);
    }

    function drawShortPathsBusy(coords, text) {
      return runBusy(text, () => drawShortPaths(coords));
    }

    function drawPointsAndShortPathsBusy(points, coords, text) {
      return runBusy(text, function() {
        drawPoints(points);
        drawShortPaths(coords);
      });
    }

    // function computes a destination point based on distance and azimuth
    function beamEndPosition(fromPoint, distance, azimuth) {
        const M_PI = Math.PI;
        const d = distance / 6371;
        let lat1 = fromPoint.lat * M_PI / 180;
        let lon1 = fromPoint.lng * M_PI / 180;
        const alpha1 = azimuth * M_PI / 180;

        let lat2 = Math.asin(Math.sin(lat1) * Math.cos(d) + Math.cos(lat1) * Math.sin(d) * Math.cos(alpha1));
        let lon2 = lon1 + Math.atan2(Math.sin(alpha1) * Math.sin(d) * Math.cos(lat1), Math.cos(d) - Math.sin(lat1) * Math.sin(lat2));

        let newLat = lat2 * 180 / M_PI;
        return {"lat": newLat, "lng": (lon2 * 180 / M_PI)};
    }

    // generic function to render Ant Path
    function drawAntPath(fromPoint, distance, azimuth, antAngle) {
        let line1 = []; // empty field means delete the line;
        let line2 = []; // empty field means delete the line;
        if (fromPoint && Object.keys(fromPoint).length != 0) {
            line1 = [fromPoint, beamEndPosition(fromPoint, distance, azimuth - (antAngle/2))];
            line2 = [fromPoint, beamEndPosition(fromPoint, distance, azimuth + (antAngle/2))];
        }
        antGeodesic1.setLatLngs(line1);
        antGeodesic2.setLatLngs(line2);
        // too many movements if focusing also antenna path, disable it
        //fitQSOAnt();
    }

    function fitQSOAnt() {
       let bound = geodesic.getBounds();
       if ( map.hasLayer(antPathLayer) ) {
          bound.extend(antGeodesic1.getBounds());
          bound.extend(antGeodesic2.getBounds());
       }
       //map.fitBounds(bound, {animate:false});
       map.panTo(bound.getCenter(), {animate:false});
    }

    var markersLayer = L.layerGroup().addTo(map);

    function drawPointMarkers(layer, points) {
        layer.clearLayers();
        points.forEach(function(point) {
           const mapPoint = normalizePoint(point);
           let marker = L.marker([mapPoint.lat, mapPoint.lng], markerOptions(mapPoint))
                         .bindPopup(mapPoint.label);
           layer.addLayer(marker);
        });
    }

    // generic function to render point on the map
    function drawPoints(points) {
        markersLayer.clearLayers();
        clearFastMarkerLayer();

        if (points.length > fastMarkerThreshold) {
          fastMarkersLayer = new FastMarkerLayer(points).addTo(map);
          return;
        }

        drawPointMarkers(markersLayer, points);
     }

    function drawPointsBusy(points, text) {
      return runBusy(text, () => drawPoints(points));
    }

     // generic function for flying to the point
     function flyToPoint(point, zoom) {
        const mapPoint = normalizePoint(point);
        map.flyTo([mapPoint.lat, mapPoint.lng], zoom);
     }

     var markersLayer2 = L.layerGroup().addTo(map);

     // generic function to render the sencond layer of the points
     // It is usually used to render My QTHs
     function drawPointsGroup2(points) {
        drawPointMarkers(markersLayer2, points);
     }

    // compute 3-color gradient
    function colorGradient(fadeFraction, rgbColor1, rgbColor2, rgbColor3) {
      let color1 = rgbColor1;
      let color2 = rgbColor2;
      let fade = fadeFraction;

      if (rgbColor3) {
        fade = fade * 2;

        if (fade >= 1) {
          fade -= 1;
          color1 = rgbColor2;
          color2 = rgbColor3;
        }
      }

      let diffRed = color2.red - color1.red;
      let diffGreen = color2.green - color1.green;
      let diffBlue = color2.blue - color1.blue;

      let gradient = {
        red: parseInt(Math.floor(color1.red + (diffRed * fade)), 10),
        green: parseInt(Math.floor(color1.green + (diffGreen * fade)), 10),
        blue: parseInt(Math.floor(color1.blue + (diffBlue * fade)), 10),
      };

      return 'rgb(' + gradient.red + ',' + gradient.green + ',' + gradient.blue + ')';
    }

    var mufLayer = L.layerGroup();

    // Render MUF points
    function drawMuf(points) {

       // definition of the color used to render the MUF
       // LOW Color for low frequency
       const lowColor = {
            red: 0,
            green: 131,
            blue: 255
       };

       // MEDIUM Color for frequencies in the middle
       const mediumColor = {
           red: 255,
           green: 162,
           blue: 0
       };

       // HIGH Color for high frequency
       const highColor = {
           red: 255,
           green: 255,
           blue: 0
       };

       mufLayer.clearLayers();
       points.forEach(function(point) {
            const mapPoint = normalizePoint(point);
            let marker = new L.marker([mapPoint.lat, mapPoint.lng], {opacity: 0.001 });
            marker.bindTooltip(mapPoint.label, {permanent: true, direction : 'bottom', offset: [-16, 8], className: 'muf-tooltip' });
            // color gradient is calculated for number interval 0 - 1.
            // MUF value is a fgrequency. Threfore is it needed to recalculate Freq to interval 0 - 1
            // QLog currently recalculate the interval 0 - 50 MHz. This is due to the fact that
            // most of the values move in this interval and it is easy to see the individual frequency ranges
            const oldValue = parseFloat(mapPoint.label);
            const oldMin = 0; const oldMax = 50; //frequency input range (0 - 50MHz)
            const newMin = 0; const newMax = 1; //mapped to range 0 - 1
            const newValue = (oldValue - oldMin) / (oldMax - oldMin) * (newMax - newMin) + newMin;
            const color = colorGradient(newValue, lowColor, mediumColor, highColor);

            marker.getTooltip().setContent(`<div style="background-color: ${color};border-radius: 20px;padding: 5px;font-weight: bold;">${marker.getTooltip().getContent()}</div>`);
            mufLayer.addLayer(marker);
         });
     }

    var ibpBands = [];
    var ibpBeacons = [];
    var ibpCurrentBand = "";
    var IBPLayer = L.layerGroup().addTo(map);
    var prevStationIndex = -1;

    function configureIbpData(bands, beacons) {
       ibpBands = Array.isArray(bands) ? bands : [];
       ibpBeacons = Array.isArray(beacons) ? beacons : [];
       prevStationIndex = -1;
       updateBeacon();
    }

    function setIbpCurrentBand(bandName) {
       ibpCurrentBand = bandName || "";
       prevStationIndex = -1;
       updateBeacon();
    }

    function IBPCallsignPressed(e) {
       const currentBand = ibpBands.find(object => {return object.name === ibpCurrentBand;});
       if (!currentBand)
         return;

       sendToQt('IBPCallsignClicked', this.callsign, currentBand.frequency);
     }

    // render IBP Beacon Point
    function beaconPoint(beacon, color) {
       let pointColor = color;
       if ( !beacon.active ) {
         pointColor = 'red';
       }

       let marker = new L.marker([beacon.lat, beacon.lon], {opacity: 0.001 });
       let mirrorLon = beacon.lon - 360;
       if ( mirrorLon < -360 ) {
          mirrorLon = beacon.lon + 360;
       }
       let markerMirror = new L.marker([beacon.lat, mirrorLon], {opacity: 0.001 });
       marker.bindTooltip(beacon.callsign, {permanent: true, direction : 'bottom', offset: [-16, 8], className: 'muf-tooltip' });
       marker.on('dblclick', IBPCallsignPressed);
       marker.callsign = beacon.callsign;
       markerMirror.bindTooltip(beacon.callsign, {permanent: true, direction : 'bottom', offset: [-16, 8], className: 'muf-tooltip' });
       markerMirror.on('dblclick', IBPCallsignPressed);
       markerMirror.callsign = beacon.callsign;
       marker.getTooltip().setContent(`<div style="background-color: ${pointColor};border-radius: 20px;padding: 5px;font-weight: bold;">${marker.getTooltip().getContent()}</div>`);
       markerMirror.getTooltip().setContent(`<div style="background-color: ${pointColor};border-radius: 20px;padding: 5px;font-weight: bold;">${markerMirror.getTooltip().getContent()}</div>`);
       IBPLayer.addLayer(marker);
       IBPLayer.addLayer(markerMirror);
    }

    // Update IBP Beacon Points
    function updateBeacon() {

       const currentBandIndex = ibpBands.findIndex(object => {return object.name === ibpCurrentBand;});

       if ( currentBandIndex == -1 || ibpBeacons.length == 0 ) {
           IBPLayer.clearLayers();
           return;
       }

       let today = new Date();
       let n = Math.floor(today.getTime()/10000) % ibpBeacons.length;
       let currentStationIndex = (ibpBeacons.length + n - currentBandIndex) % ibpBeacons.length;
       let nextStationIndex = (ibpBeacons.length + 1 + n - currentBandIndex) % ibpBeacons.length;

       if ( currentStationIndex == prevStationIndex ) {
           return;
       }

       IBPLayer.clearLayers();

       prevStationIndex = currentStationIndex;

       // show current
       let b = ibpBeacons[currentStationIndex];
       beaconPoint(b, '#FFFF33');

       // show next
       b = ibpBeacons[nextStationIndex];
       beaconPoint(b, '#1AA260');
    }

    var chatStationsLayer = L.layerGroup().addTo(map);

    function chatCallsignPressed(e) {
       sendToQt('chatCallsignClicked', this.callsign);
    }

    // generic function to render the third layer of the points
    // It is usually used to render Chat Stations
    function drawPointsGroup3(points) {
       chatStationsLayer.clearLayers();
       points.forEach(function(point) {
          const mapPoint = normalizePoint(point);
          let marker = new L.marker([mapPoint.lat, mapPoint.lng], {opacity: 0.001 });
          marker.bindTooltip(mapPoint.label, {pane: 'lowestPane', permanent: true, direction : 'bottom', offset: [-16, 8], className: 'chat-tooltip' });
          marker.on('dblclick', chatCallsignPressed);
          marker.callsign = mapPoint.label;
          marker.getTooltip().setContent(`<div style="background-color: aqua;border-radius: 20px;padding: 5px;font-weight: bold;">${marker.getTooltip().getContent()}</div>`);
          chatStationsLayer.addLayer(marker);
       });
    }

    setInterval(function(){updateBeacon()}, 250);

    function wsjtxCallsignPressed(e) {
       sendToQt('wsjtxCallsignClicked', this.callsign);
    }

    var wsjtxStationsLayer = L.layerGroup();

    // this function show WSJTX spots
    function addWSJTXSpot(point, color, textColor) {
        const spot = normalizePoint(point);
        const fadeSchedule = [
            { timeout: 30000, className: 'fade-out75' },
            { timeout: 45000, className: 'fade-out50' },
        ];

        const tooltipHTML = content =>
            `<div style="background-color: ${color};color: ${textColor};border-radius:20px;padding:5px;font-weight:bold;">${content}</div>`;

        function createSpotMarker(latitude, longitude) {
            const marker = new L.marker([latitude, longitude], { opacity: 0.001 });
            marker.callsign = spot.label;

            marker.bindTooltip(spot.label, {
                pane: 'lowestPane',
                permanent: true,
                direction: 'bottom',
                offset: [-16, 8],
                className: 'wsjtx-tooltip'
            });

            marker.on('dblclick', wsjtxCallsignPressed);

            const tooltip = marker.getTooltip();
            tooltip.setContent(tooltipHTML(tooltip.getContent()));

            return marker;
        }

        // the main marker
        const marker = createSpotMarker(spot.lat, spot.lng);

        // mirror marker
        const mirrorLon = spot.lng >= 0 ? spot.lng - 360 : spot.lng + 360;
        const markerMirror = createSpotMarker(spot.lat, mirrorLon);

        wsjtxStationsLayer.addLayer(marker);
        wsjtxStationsLayer.addLayer(markerMirror);

        fadeSchedule.forEach(item => {
            setTimeout(() => {
                marker.getTooltip().getElement().classList.add(item.className);
                markerMirror.getTooltip().getElement().classList.add(item.className);
            }, item.timeout);
        });

        setTimeout(() => {
            map.removeLayer(marker);
            map.removeLayer(markerMirror);
        }, 60000);
    }

    function clearWSJTXSpots() {
        wsjtxStationsLayer.clearLayers();
    }

    function setStaticMapTime(newDate) {
        staticMapTime = newDate;
        grayline.setTime(staticMapTime);
        grayline.redraw();
    }
  </script>
